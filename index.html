<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Для тебя киса ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at center, #160101 0%, #000000 100%);
  overflow: hidden;
  font-family: Georgia, serif;
  touch-action: none; 
}

canvas {
  display: block;
}

.signature {
  position: absolute;
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: #ffe6e6;
  opacity: 0;
  transition: opacity 2s ease-in-out;
  font-size: clamp(15px, 4.2vw, 19px);
  width: 90%;
  text-shadow: 0 0 15px rgba(255, 50, 50, 0.7);
  pointer-events: none;
  line-height: 1.5;
}

.signature div {
  margin-bottom: 5px;
}

.signature.visible {
  opacity: 1;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="signature" id="sig">
  <div>8 октября 2024 года</div>
  <div>ты лучшее, что со мной<br>произошло за всю мою<br>жизнь, киса ❤️</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w, h, cx, cy;
const TEXT = "I Love You";

let isMobile = false;
let particles = [];
let stars = [];
let startTime = null;
let assembled = false;

function init() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  isMobile = w < 600;

  cx = w / 2;
  cy = h / 2 - (isMobile ? h * 0.11 : h * 0.06); 

  const scale = Math.min(w, h) / (isMobile ? 2.7 : 2.3);

  // Шаг сетки: подбираем под размеры строки "I Love You" на мобилке/десктопе
  // Это гарантирует, что надписи не будут накладываться друг на друга
  const stepX = isMobile ? 22 : 38; 
  const stepY = isMobile ? 11 : 18; 

  const targets = [];

  // Идем циклом по координатам экрана с фиксированным шагом
  for (let x = cx - scale * 1.3; x < cx + scale * 1.3; x += stepX) {
    for (let y = cy - scale * 1.3; y < cy + scale * 1.3; y += stepY) {
      
      // Переводим экранные координаты обратно в математические для формулы сердца
      let rx = (x - cx) / scale;
      let ry = -(y - cy) / scale; // переворачиваем ось Y
      
      // Формула внутренности сердца: (x^2 + y^2 - 1)^3 - x^2 * y^3 <= 0
      let val = Math.pow(rx*rx + ry*ry - 1, 3) - (rx*rx * ry*ry*ry);
      
      if (val <= 0) {
        let distFromCenter = Math.sqrt(rx*rx + ry*ry);
        
        // Добавляем микро-сдвиг, чтобы убрать идеальную «роботизированную» сетку,
        // но оставляем его в пределах половины шага, чтобы избежать каши
        let offsetX = (Math.random() - 0.5) * (stepX * 0.3);
        let offsetY = (Math.random() - 0.5) * (stepY * 0.3);

        targets.push({
          x: x + offsetX,
          y: y + offsetY,
          dist: distFromCenter
        });
      }
    }
  }

  // Создаем частицы на основе выверенных точек сетки
  particles = targets.map(t => {
    const angle = Math.random() * Math.PI * 2;
    const spawnDist = Math.max(w, h) * (0.6 + Math.random() * 0.4); 

    // Размер шрифта зависит от удаленности от центра: к краям буквы аккуратно уменьшаются
    let size;
    if (isMobile) {
      size = t.dist > 0.75 ? 6 + Math.random() * 2 : 9 + Math.random() * 4;
    } else {
      size = t.dist > 0.75 ? 9 + Math.random() * 3 : 13 + Math.random() * 8;
    }

    // Роскошная палитра оттенков
    const rand = Math.random();
    let color;
    let alpha = t.dist > 0.8 ? 0.3 + Math.random() * 0.25 : 0.5 + Math.random() * 0.4;

    if (rand > 0.85) {
      color = `rgba(255, ${200 + Math.floor(Math.random() * 55)}, 160, `; // Золотисто-нежный
    } else if (rand > 0.4) {
      color = `rgba(255, ${70 + Math.floor(Math.random() * 50)}, 70, `;   // Насыщенный красный
    } else {
      color = `rgba(190, 30, 40, `;                                      // Глубокий бархатный
    }

    return {
      x: cx + Math.cos(angle) * spawnDist,
      y: cy + Math.sin(angle) * spawnDist,
      tx: t.x,
      ty: t.y,
      size: size,
      baseColor: color,
      alpha: alpha,
      speed: 0.012 + Math.random() * 0.022 // Мягкая скорость сборки
    };
  });

  // Рендерим сначала мелкие, потом крупные поверх
  particles.sort((a, b) => a.size - b.size);

  // Спокойный звездный фон
  stars = [];
  const starCount = isMobile ? 30 : 70;
  for(let i = 0; i < starCount; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      size: Math.random() * 1.5 + 0.4,
      alpha: Math.random() * Math.PI,
      speed: 0.005 + Math.random() * 0.01
    });
  }

  startTime = null;
  assembled = false;
  document.getElementById("sig").classList.remove("visible");
}

function animate(time) {
  if (!startTime) startTime = time;
  const elapsed = time - startTime;

  // Очищаем бэкграунд глубоким цветом
  ctx.fillStyle = '#080000';
  ctx.fillRect(0, 0, w, h);

  // Магия мерцания фоновых светлячков
  for(let star of stars) {
    star.alpha += star.speed;
    const currentAlpha = Math.abs(Math.sin(star.alpha)) * 0.4;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 190, 140, ${currentAlpha})`;
    ctx.fill();
  }

  let allInPlace = true;
  let beat = 1;

  // Плавное, едва заметное "дыхание" сердца в самом конце
  if (assembled) {
    const cycle = elapsed % 1800; 
    const normalizedTime = cycle / 1800;
    if (normalizedTime < 0.15) {
      beat = 1 + Math.sin(normalizedTime * Math.PI / 0.15) * 0.025;
    } else if (normalizedTime > 0.22 && normalizedTime < 0.37) {
      beat = 1 + Math.sin((normalizedTime - 0.22) * Math.PI / 0.15) * 0.015;
    }
  }

  // Рисуем надписи
  for (let p of particles) {
    const dx = p.tx - p.x;
    const dy = p.ty - p.y;

    if (!assembled) {
      p.x += dx * p.speed;
      p.y += dy * p.speed;
      if (Math.abs(dx) > 0.8 || Math.abs(dy) > 0.8) {
        allInPlace = false;
      }
    }

    ctx.font = `italic ${p.size}px Georgia`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    ctx.fillStyle = p.baseColor + p.alpha + ")";
    ctx.shadowBlur = 0; 

    if (assembled) {
      const currentX = cx + (p.tx - cx) * beat;
      const currentY = cy + (p.ty - cy) * beat;
      ctx.fillText(TEXT, currentX, currentY);
    } else {
      ctx.fillText(TEXT, p.x, p.y);
    }
  }

  if (allInPlace && !assembled) {
    assembled = true;
    document.getElementById("sig").classList.add("visible");
  }

  requestAnimationFrame(animate);
}

window.addEventListener("resize", () => {
  clearTimeout(window._r);
  window._r = setTimeout(init, 250);
});

init();
requestAnimationFrame(animate);
</script>

</body>
</html>
